<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>케어위드유 앱 다운로드</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4ff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 320px;
      width: 90%;
    }
    .logo { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 6px; }
    p { color: #888; font-size: 14px; margin-bottom: 28px; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-ios { background: #000; color: #fff; }
    .btn-android { background: #01875f; color: #fff; }
    .btn svg { width: 20px; height: 20px; fill: white; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏥</div>
    <h1>케어위드유</h1>
    <p>병원 동행 서비스</p>
    <a class="btn btn-ios" href="https://apps.apple.com/app/id6761446171">
      <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      App Store
    </a>
    <a class="btn btn-android" href="https://play.google.com/store/apps/details?id=com.carewithyou.app">
      <svg viewBox="0 0 24 24"><path d="M3.18 23.76c.3.17.64.19.96.07l12.45-7.19-2.68-2.68-10.73 9.8zM.35 1.12C.13 1.46 0 1.9 0 2.44v19.12c0 .54.13.98.35 1.32l.07.07 10.7-10.7v-.25L.42 1.05l-.07.07zM20.69 10.2l-2.83-1.64-3 3 3 3 2.85-1.65c.81-.47.81-1.24-.02-1.71zM3.18.24L15.63 7.4l-2.68 2.68L2.22.28c.32-.13.67-.11.96-.04z"/></svg>
      Google Play
    </a>
  </div>
  <script>
    const ua = navigator.userAgent;
    if (/iPhone|iPad|iPod/i.test(ua)) {
      window.location.href = "https://apps.apple.com/app/id6761446171";
    } else if (/Android/i.test(ua)) {
      window.location.href = "https://play.google.com/store/apps/details?id=com.carewithyou.app";
    }
  </script>
</body>
</html>
